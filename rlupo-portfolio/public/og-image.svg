<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0B"/>

  <!-- Decorative gradient circles -->
  <defs>
    <radialGradient id="tealGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0066FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0066FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <circle cx="200" cy="150" r="200" fill="url(#tealGlow)"/>
  <circle cx="1000" cy="500" r="250" fill="url(#blueGlow)"/>

  <!-- Main Name -->
  <text x="600" y="280" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="700" fill="#FAFAFA" text-anchor="middle" letter-spacing="-0.02em">TREY LUPO</text>

  <!-- Subtitle -->
  <text x="600" y="380" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="400" fill="#888899" text-anchor="middle">FP&amp;A Analyst · Data Scientist</text>

  <!-- Location -->
  <text x="600" y="450" font-family="monospace" font-size="20" font-weight="500" fill="#555566" text-anchor="middle" letter-spacing="0.1em">TAMPA, FL</text>

  <!-- Accent line -->
  <rect x="500" y="490" width="200" height="2" fill="#00D4AA" rx="1"/>
</svg>
